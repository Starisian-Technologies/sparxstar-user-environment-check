name: Release Code Quality Final Review

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Get the version from the tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Update version numbers
        run: |
          sed -i -E 's/("version":\s*").*(")/'\\1'${{ env.VERSION }}'\\2'/' package.json
          sed -i -E "s/^(\\s*\\* Version:\\s*).*/\\1${{ env.VERSION }}/" sparxstar-user-environment-check.php
          sed -i "s/define( 'SPX_UEC_VERSION', '[^']*' );/define( 'SPX_UEC_VERSION', '${{ env.VERSION }}' );/" sparxstar-user-environment-check.php
          find . -type f -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 sed -i "s/@version\\s\\+[0-9.]\\+/@version ${{ env.VERSION }}/g"

      - name: Commit version bump and update tag
        run: |
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore(release): Bump version to ${{ env.VERSION }}"
            DEFAULT_BRANCH=${{ github.event.repository.default_branch }}
            git push origin HEAD:"refs/heads/$DEFAULT_BRANCH"
            git tag -f $GITHUB_REF_NAME
            git push origin $GITHUB_REF_NAME --force
          else
            echo "No version changes to commit."
          fi

      - name: Verify plugin entrypoint
        run: |
          test -f sparxstar-user-environment-check.php || { echo "Missing entrypoint"; exit 1; }
          grep -q "Plugin Name:" sparxstar-user-environment-check.php || { echo "Missing plugin header"; exit 1; }

      - name: Set up PHP
        uses: shivammathur/setup-php@ec406be512d7077f68eed36e63f4d91bc006edc4
        with:
          php-version: "8.2"
          tools: composer:v2
          coverage: none

      - name: Install PHP dependencies (no-dev)
        run: composer install --no-dev --prefer-dist --no-progress --no-interaction --optimize-autoloader

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install JS dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Verify UEC asset output
        run: |
          test -f assets/js/device-detector.min.js || { echo "Missing device detector bundle"; exit 1; }
          test -f assets/js/fingerprintjs/fp.min.js || { echo "Missing fingerprint js"; exit 1; }

      - name: Ensure .distignore exists
        run: test -f .distignore || { echo ".distignore is missing"; exit 1; }

      - name: Build plugin ZIP
        run: |
          SLUG="sparxstar-user-environment-check"
          VERSION=${{ env.VERSION }}
          rm -rf build
          mkdir -p build
          rsync -a --exclude-from=.distignore ./ build/${SLUG}/
          (cd build && zip -r "../${SLUG}-${VERSION}.zip" "${SLUG}")

      - name: Generate checksums
        run: |
          ZIP="sparxstar-user-environment-check-${{ env.VERSION }}.zip"
          sha256sum "$ZIP" > "$ZIP.sha256"
          sha1sum   "$ZIP" > "$ZIP.sha1"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836
        with:
          files: |
            sparxstar-user-environment-check-${{ env.VERSION }}.zip
            sparxstar-user-environment-check-${{ env.VERSION }}.zip.sha256
            sparxstar-user-environment-check-${{ env.VERSION }}.zip.sha1
