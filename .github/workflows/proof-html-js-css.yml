name: Proof HTML, Lint JS & CSS

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Proof Frontend Assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 8.6.0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint JavaScript (check only)
        run: pnpm run lint:js
      - name: Lint CSS (check only)
        run: pnpm run lint:css
      - name: Proof HTML files
        uses: anishathalye/proof-html@acec311c40ea13c9ffa6490e77ac67f52594f403
        with:
          directory: './'

  auto-fix:
    name: Auto-fix JS & CSS
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 8.6.0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Fix JavaScript and CSS issues
        run: |
          pnpm run lint:js:fix
          pnpm run lint:css:fix
      - name: Commit and push fixes
        uses: stefanzweifel/git-auto-commit-action@778341af668090896ca464160c2def5d1d1a3eb0
        with:
          commit_message: 'chore: auto-fix JS/CSS lint issues'
          branch: ${{ github.head_ref }}
          file_pattern: 'src/js/**/*.js src/css/**/*.css'
